 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaibhavi Portfolio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Vaibhavi Codes</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<!-- Hero -->
<section id="home">
    <h2 id="typing"></h2>
    <p>I create modern responsive websites</p>
    <button onclick="scrollToContact()">Hire Me</button>
</section>

<!-- Services -->
<section id="services">
    <h2>My Services</h2>
    <div class="cards">

        <div class="card">
            <h3>Website Design</h3>
            <p>Modern websites</p>
        </div>

        <div class="card">
            <h3>Landing Pages</h3>
            <p>Attractive UI</p>
        </div>

        <div class="card">
            <h3>Student Projects</h3>
            <p>College websites</p>
        </div>

    </div>
</section>

<!-- Contact -->
<section id="contact">
    <h2>Contact Me</h2>

    <form onsubmit="sendMessage(event)">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea placeholder="Your Message" required></textarea>
        <button type="submit">Send</button>
    </form>

    <p id="msg"></p>
</section>

<footer>
    <p>© 2026 Vaibhavi Codes</p>
</footer>

<script src="script.js"></script>
</body>
</html>
